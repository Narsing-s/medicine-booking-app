<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medicine Booking App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
header{background:#1976d2;color:#fff;padding:15px;text-align:center}
section{padding:20px}
input,button,select{padding:10px;margin:5px;width:100%}
button{background:#1976d2;color:#fff;border:none;border-radius:5px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:8px}
.hidden{display:none}
nav button{width:auto;margin:5px}
</style>
</head>

<body>

<header>
<h2>💊 Medicine Booking System</h2>
<nav>
<button onclick="show('login')">Login</button>
<button onclick="show('signup')">Signup</button>
<button onclick="show('store')">Store</button>
<button onclick="show('cart')">Cart</button>
<button onclick="show('orders')">Orders</button>
</nav>
</header>

<!-- LOGIN -->
<section id="login">
<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</section>

<!-- SIGNUP -->
<section id="signup" class="hidden">
<h3>Signup</h3>
<input id="suName" placeholder="Name">
<input id="suEmail" placeholder="Email">
<input id="suPass" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
</section>

<!-- STORE -->
<section id="store" class="hidden">
<h3>Medicine Store</h3>

<div class="card">Paracetamol — ₹25 <button onclick="addCart('Paracetamol',25)">Add</button></div>
<div class="card">Vitamin C — ₹150 <button onclick="addCart('Vitamin C',150)">Add</button></div>
<div class="card">Cough Syrup — ₹120 <button onclick="addCart('Cough Syrup',120)">Add</button></div>
<div class="card">Insulin — ₹350 <button onclick="addCart('Insulin',350)">Add</button></div>

<h4>Upload Prescription</h4>
<input type="file">
</section>

<!-- CART -->
<section id="cart" class="hidden">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<select id="payMode">
<option>Cash on Delivery</option>
<option>UPI (Mock)</option>
</select>

<button onclick="placeOrder()">Place Order</button>
</section>

<!-- ORDERS -->
<section id="orders" class="hidden">
<h3>Order Tracking</h3>
<div id="orderList"></div>
</section>

<script>
let user=null;
let cart=[];

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function signup(){
let u={
name:suName.value,
email:suEmail.value,
pass:suPass.value
};
localStorage.setItem("user",JSON.stringify(u));
alert("Signup successful");
show("login");
}

function login(){
let u=JSON.parse(localStorage.getItem("user"));
if(!u||u.email!==loginEmail.value||u.pass!==loginPass.value){
alert("Invalid login");return;
}
user=u;
alert("Welcome "+u.name);
show("store");
}

function addCart(name,price){
cart.push({name,price});
alert("Added to cart");
}

function showCart(){
let div=document.getElementById("cartItems");
div.innerHTML="";
cart.forEach(c=>{
div.innerHTML+=`<div class='card'>${c.name} - ₹${c.price}</div>`;
});
}

function placeOrder(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push({
items:cart,
status:"Placed"
});
localStorage.setItem("orders",JSON.stringify(orders));
cart=[];
alert("Order placed successfully");
show("orders");
loadOrders();
}

function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
let div=document.getElementById("orderList");
div.innerHTML="";
orders.forEach((o,i)=>{
div.innerHTML+=`
<div class='card'>
Order #${i+1}<br>
Status: ${o.status}<br>
Tracking: Placed ➜ Shipped ➜ Delivered
</div>`;
});
}

document.addEventListener("click",()=>{
if(!document.getElementById("cart").classList.contains("hidden")){
showCart();
}
if(!document.getElementById("orders").classList.contains("hidden")){
loadOrders();
}
});
</script>

</body>
</html>
